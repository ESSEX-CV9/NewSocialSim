      tags:
        - admin
      security: *a3
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                      properties:
                        id:
                          type: integer
                        handle:
                          type: string
                        displayName:
                          type: string
                        isBot:
                          type: boolean
    post:
      operationId: createAdminUser
      summary: 代理建号（设 is_bot=1）
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - handle
                - displayName
              additionalProperties: false
              properties:
                handle:
                  type: string
                  description: 须拟真，禁止 sim_/bot/npc/序号后缀等暴露虚拟身份的命名
                displayName:
                  type: string
                password:
                  type: string
                  description: 不给则随机生成并在响应返回
      security: *a3
      responses:
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  id:
                    type: integer
                  handle:
                    type: string
                  displayName:
                    type: string
                  password:
                    type: string
                    description: 若请求未给 password，此处返回随机生成值
  /api/admin/login-as:
    post:
      operationId: loginAs
      summary: 代登录票据（供模拟器驱动）
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              additionalProperties: false
              properties:
                userId:
                  type: integer
      security: *a3
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  token:
                    type: string
                  userId:
                    type: integer
                  handle:
                    type: string
                  displayName:
                    type: string
  /api/admin/llm-config:
    get:
      operationId: getLlmConfig
      summary: 读 LLM 配置
      tags:
        - admin
      security: *a3
      responses:
        "200":
          description: Default Response
    put:
      operationId: saveLlmConfig
      summary: 存 LLM 配置
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      security: *a3
      responses:
        "200":
          description: Default Response
  /api/admin/llm-config/fetch-models:
    post:
      operationId: fetchLlmModels
      summary: 拉模型列表
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - source
                - apiKey
              additionalProperties: false
              properties:
                source:
                  type: string
                apiKey:
                  type: string
                baseUrl:
                  type: string
      security: *a3
      responses:
        "200":
          description: Default Response
  /api/admin/run-agent:
    post:
      operationId: runAgent
      summary: 拉起 Agent 执行
      tags:
        - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - prompt
              additionalProperties: false
              properties:
                prompt:
                  type: string
      security: *a3
      responses:
        "200":
          description: Default Response
  /api/simulator/status:
    get:
      operationId: getSimulatorStatus
      summary: 模拟器状态（编辑器轮询）
      tags:
        - simulator
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulatorStatus"
  /api/simulator/heartbeat:
    post:
      operationId: postSimulatorHeartbeat
      summary: 模拟器上报心跳（每 loop）
      tags:
        - simulator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - boundWorldId
                - accountCount
                - tickNumber
                - lastFlushedWorldId
                - lastFlushAt
              additionalProperties: false
              properties:
                boundWorldId:
                  type:
                    - string
                    - "null"
                accountCount:
                  type: integer
                tickNumber:
                  type: integer
                lastFlushedWorldId:
                  type:
                    - string
                    - "null"
                lastFlushAt:
                  type:
                    - integer
                    - "null"
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
servers:
