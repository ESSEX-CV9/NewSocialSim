openapi: 3.1.0
info:
  title: NewSocialSim 社交站 API
  description: >-
    本地社交媒体模拟器（仿 X/Twitter）的社交站后端 HTTP API。第二阶段虚拟用户与真人走相同接口——此 spec 即唯一契约面。


    约定：时间字段均为世界**模拟时间**（unix 毫秒）；列表接口游标分页 `{ items, nextCursor }`，游标
    base64url(JSON) 不透明；任一时刻一个活动世界，读写默认作用于活动世界。
  version: 0.1.0
components:
  securitySchemes:
    bearerJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 登录用户 JWT。JWT 含 worldId，切世界后旧 token 全部 401。
    adminKey:
      type: http
      scheme: bearer
      description: 管理端 admin key（默认 dev-admin-key，env SOCIALSIM_ADMIN_KEY）。
    sseToken:
      type: apiKey
      in: query
      name: token
      description: SSE 流凭证：EventSource 带不了 header，故 JWT 走 ?token= 查询参数。
  schemas: {}
paths:
  /api/health:
    get:
      operationId: health
      summary: 健康检查
      tags:
        - meta
      responses:
        "200":
          description: Default Response
  /api/admin/worlds:
    get:
      operationId: listWorlds
      summary: 列世界
      tags:
        - worlds
      responses:
        "200":
          description: Default Response
    post:
      operationId: createWorld
      summary: 创建世界
      tags:
        - worlds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - name
              additionalProperties: false
              properties:
                id:
                  type: string
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                description:
                  type: string
                  maxLength: 2000
                locale:
                  type: string
                  enum:
                    - zh-CN
                    - en
                contentRating:
                  type: string
                  enum:
                    - safe
                    - all
                clock:
                  type: object
                  additionalProperties: false
                  properties:
                    simTimeMs:
                      type: integer
                    scale:
                      type: number
                    paused:
                      type: boolean
                calendar:
                  type: object
                  required:
                    - label
                  additionalProperties: false
                  properties:
                    label:
                      type: string
                      minLength: 1
                      maxLength: 50
      responses:
        "200":
          description: Default Response
  /api/admin/worlds/{id}/activate:
    post:
      operationId: activateWorld
      summary: 激活（切换）世界
      tags:
        - worlds
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/admin/worlds/active:
    get:
      operationId: getActiveWorld
      summary: 活动世界 + 当前模拟时间
      tags:
        - worlds
      responses:
        "200":
          description: Default Response
  /api/admin/worlds/{id}:
    patch:
      operationId: updateWorldMeta
      summary: 改世界元数据
      tags:
        - worlds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                description:
                  type: string
                  maxLength: 2000
                locale:
                  type: string
                  enum:
                    - zh-CN
                    - en
                contentRating:
                  type: string
                  enum:
                    - safe
                    - all
                calendar:
                  type: object
                  required:
                    - label
                  additionalProperties: false
                  properties:
                    label:
                      type: string
                      minLength: 1
                      maxLength: 50
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    delete:
      operationId: deleteWorld
      summary: 删除世界
      tags:
        - worlds
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/admin/worlds/clock:
    post:
      operationId: controlWorldClock
      summary: 时钟控制（暂停/恢复/调速/跳转）
      tags:
        - worlds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
              additionalProperties: false
              properties:
                type:
                  type: string
                  enum:
                    - pause
                    - resume
                    - setScale
                    - setTime
                scale:
                  type: number
                simTimeMs:
                  type: integer
      responses:
        "200":
          description: Default Response
  /api/admin/worlds/{id}/copy:
    post:
      operationId: copyWorld
      summary: 复制世界
      tags:
        - worlds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - newId
              additionalProperties: false
              properties:
                newId:
                  type: string
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/admin/worlds/snapshots:
    post:
      operationId: createWorldSnapshot
      summary: 对活动世界建快照
      tags:
        - worlds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              additionalProperties: false
              properties:
                name:
                  type: string
                  minLength: 1
                description:
                  type: string
      responses:
        "200":
          description: Default Response
  /api/admin/worlds/{id}/snapshots:
    get:
      operationId: listWorldSnapshots
      summary: 列快照
      tags:
        - worlds
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/admin/worlds/{id}/snapshots/{name}/restore:
    post:
      operationId: restoreWorldSnapshot
      summary: 恢复快照
      tags:
        - worlds
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
        - schema:
            type: string
          in: path
          name: name
          required: true
      responses:
        "200":
          description: Default Response
  /api/admin/worlds/{id}/snapshots/{name}:
    delete:
      operationId: deleteWorldSnapshot
      summary: 删快照
      tags:
        - worlds
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
        - schema:
            type: string
          in: path
          name: name
          required: true
      responses:
        "200":
          description: Default Response
  /api/media/upload:
    post:
      operationId: uploadMedia
      summary: 上传文件
      tags:
        - media
      security: &a1
        - bearerJWT: []
      responses:
        "200":
          description: Default Response
  /api/media/from-url:
    post:
      operationId: importMediaFromUrl
      summary: 外链下载入库
      tags:
        - media
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              additionalProperties: false
              properties:
                url:
                  type: string
                  minLength: 1
                  maxLength: 2048
                source:
                  type: string
                  maxLength: 50
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/media/{id}/file:
    get:
      operationId: getMediaFile
      summary: 媒体文件流
      tags:
        - media
      parameters:
        - schema:
            type: string
            minLength: 1
          in: query
          name: w
          required: true
        - schema:
            type: integer
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/media-search:
    get:
      operationId: searchImages
      summary: 关键字搜图
      tags:
        - media-search
      parameters:
        - schema:
            type: string
            minLength: 1
            maxLength: 100
          in: query
          name: q
          required: true
        - schema:
            type: string
            maxLength: 20
          in: query
          name: source
          required: false
        - schema:
            type: string
            enum:
              - safe
              - all
              - r18
          in: query
          name: rating
          required: false
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/media-search/sources:
    get:
      operationId: listImageSources
      summary: 可用图源
      tags:
        - media-search
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/media-search/preview:
    get:
      operationId: previewImageUrl
      summary: 外链预览代理
      tags:
        - media-search
      parameters:
        - schema:
            type: string
            minLength: 1
            maxLength: 2048
          in: query
          name: url
          required: true
      responses:
        "200":
          description: Default Response
  /api/media-search/config:
    get:
      operationId: getMediaSearchConfig
      summary: 读搜图配置
      tags:
        - media-search
      security: *a1
      responses:
        "200":
          description: Default Response
    patch:
      operationId: updateMediaSearchConfig
      summary: 改搜图配置
      tags:
        - media-search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                proxy:
                  type: string
                  maxLength: 200
                pixiv:
                  type: object
                  additionalProperties: false
                  properties:
                    refreshToken:
                      type: string
                      maxLength: 200
                    allowR18G:
                      type: boolean
                pinterest:
                  type: object
                  additionalProperties: false
                  properties:
                    cookies:
                      type: string
                      maxLength: 8192
                pexels:
                  type: object
                  additionalProperties: false
                  properties:
                    apiKey:
                      type: string
                      maxLength: 200
                danbooru:
                  type: object
                  additionalProperties: false
                  properties:
                    username:
                      type: string
                      maxLength: 100
                    apiKey:
                      type: string
                      maxLength: 200
                gelbooru:
                  type: object
                  additionalProperties: false
                  properties:
                    userId:
                      type: string
                      maxLength: 100
                    apiKey:
                      type: string
                      maxLength: 200
                tools:
                  type: object
                  additionalProperties: false
                  properties:
                    ytdlpUrl:
                      type: string
                      maxLength: 500
                    ffmpegUrl:
                      type: string
                      maxLength: 500
                bilibili:
                  type: object
                  additionalProperties: false
                  properties:
                    cookies:
                      type: string
                      maxLength: 8192
                video:
                  type: object
                  additionalProperties: false
                  properties:
                    maxHeight:
                      type: number
                      minimum: 144
                      maximum: 4320
                    maxDownloadMb:
                      type: number
                      minimum: 1
                      maximum: 4096
                    defaultMode:
                      type: string
                      enum:
                        - download
                        - stream
                    hlsFallback:
                      type: string
                      enum:
                        - download
                        - error
                    siteModes:
                      type: object
                      additionalProperties: false
                      properties:
                        youtube:
                          type: string
                          enum:
                            - embed
                            - download
                            - stream
                        bilibili:
                          type: string
                          enum:
                            - embed
                            - download
                            - stream
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/media-search/pixiv/login:
    post:
      operationId: pixivLogin
      summary: Pixiv 引导登录
      tags:
        - media-search
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/media-search/pixiv/login/status:
    get:
      operationId: pixivLoginStatus
      summary: Pixiv 登录态
      tags:
        - media-search
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/media-search/pixiv/code:
    post:
      operationId: pixivSubmitCode
      summary: 提交 Pixiv code
      tags:
        - media-search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              additionalProperties: false
              properties:
                code:
                  type: string
                  minLength: 1
                  maxLength: 2048
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/media-search/bilibili/login:
    post:
      operationId: bilibiliLogin
      summary: B 站引导登录
      tags:
        - media-search
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/media-search/bilibili/login/status:
    get:
      operationId: bilibiliLoginStatus
      summary: B 站登录态
      tags:
        - media-search
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/tools/status:
    get:
      operationId: getToolsStatus
      summary: 安装状态
      tags:
        - tools
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/tools/latest:
    get:
      operationId: getLatestToolVersions
      summary: 最新版本
      tags:
        - tools
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/tools/{id}/install:
    post:
      operationId: installTool
      summary: 安装工具
      tags:
        - tools
      parameters:
        - schema:
            type: string
            enum:
              - yt-dlp
              - ffmpeg
          in: path
          name: id
          required: true
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/tools/{id}/install/status:
    get:
      operationId: getToolInstallStatus
      summary: 安装进度
      tags:
        - tools
      parameters:
        - schema:
            type: string
            enum:
              - yt-dlp
              - ffmpeg
          in: path
          name: id
          required: true
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/video/ingest:
    post:
      operationId: ingestVideo
      summary: 引入视频
      tags:
        - video-search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              additionalProperties: false
              properties:
                url:
                  type: string
                  minLength: 1
                  maxLength: 2048
                mode:
                  type: string
                  enum:
                    - auto
                    - download
                    - stream
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/video/sources:
    get:
      operationId: listVideoSources
      summary: 视频源
      tags:
        - video-search
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/video/search:
    get:
      operationId: searchVideos
      summary: 搜视频
      tags:
        - video-search
      parameters:
        - schema:
            type: string
            minLength: 1
            maxLength: 100
          in: query
          name: q
          required: true
        - schema:
            type: string
            maxLength: 20
          in: query
          name: source
          required: false
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/video/tasks:
    get:
      operationId: listVideoTasks
      summary: 异步任务列表
      tags:
        - video-search
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/video/tasks/{id}:
    get:
      operationId: getVideoTask
      summary: 单任务查询
      tags:
        - video-search
      parameters:
        - schema:
            type: string
            minLength: 1
            maxLength: 50
          in: path
          name: id
          required: true
      security: *a1
      responses:
        "200":
          description: Default Response
    delete:
      operationId: cancelVideoTask
      summary: 取消任务
      tags:
        - video-search
      parameters:
        - schema:
            type: string
            minLength: 1
            maxLength: 50
          in: path
          name: id
          required: true
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/media/{id}/stream:
    get:
      operationId: streamVideo
      summary: 流式视频代理
      tags:
        - media
      parameters:
        - schema:
            type: string
            minLength: 1
            maxLength: 100
          in: query
          name: w
          required: true
        - schema:
            type: integer
            minimum: 1
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /api/auth/register:
    post:
      operationId: register
      summary: 注册真人账号
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - handle
                - displayName
                - password
              additionalProperties: false
              properties:
                handle:
                  type: string
                displayName:
                  type: string
                  maxLength: 50
                password:
                  type: string
                  maxLength: 200
      responses:
        "200":
          description: Default Response
  /api/auth/login:
    post:
      operationId: login
      summary: 登录
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - handle
                - password
              additionalProperties: false
              properties:
                handle:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Default Response
  /api/auth/me:
    get:
      operationId: getMe
      summary: 当前登录用户
      tags:
        - auth
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/users/suggested:
    get:
      operationId: listSuggestedUsers
      summary: 推荐关注
      tags:
        - users
      security: &a2
        - {}
        - bearerJWT: []
      responses:
        "200":
          description: Default Response
  /api/users/{handle}:
    get:
      operationId: getUserProfile
      summary: 账号资料
      tags:
        - users
      security: *a2
      parameters:
        - schema:
            type: string
          in: path
          name: handle
          required: true
      responses:
        "200":
          description: Default Response
  /api/users/me:
    patch:
      operationId: updateMyProfile
      summary: 改本人资料
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                displayName:
                  type: string
                  maxLength: 50
                bio:
                  type: string
                  maxLength: 500
                avatarMediaId:
                  type:
                    - integer
                    - "null"
                bannerMediaId:
                  type:
                    - integer
                    - "null"
                verified:
                  type: string
                  enum:
                    - none
                    - personal
                    - org
                website:
                  type:
                    - string
                    - "null"
                  maxLength: 200
                location:
                  type:
                    - string
                    - "null"
                  maxLength: 50
                birthDate:
                  type:
                    - string
                    - "null"
                  maxLength: 10
                profession:
                  type:
                    - string
                    - "null"
                  maxLength: 50
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/posts:
    post:
      operationId: createPost
      summary: 发帖
      tags:
        - posts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              additionalProperties: false
              properties:
                content:
                  type: string
                  maxLength: 1000
                replyToId:
                  type: integer
                quoteOfId:
                  type: integer
                mediaIds:
                  type: array
                  items:
                    type: integer
                    minimum: 1
                  maxItems: 20
                  uniqueItems: true
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/posts/{id}:
    get:
      operationId: getPostById
      summary: 单帖详情（删除返墓碑）
      tags:
        - posts
      parameters:
        - schema:
            type: integer
          in: path
          name: id
          required: true
      security: *a2
      responses:
        "200":
          description: Default Response
    delete:
      operationId: deletePost
      summary: 删帖（仅本人）
      tags:
        - posts
      parameters:
        - schema:
            type: integer
          in: path
          name: id
          required: true
      security: *a1
      responses:
        "200":
          description: Default Response
  /api/posts/{id}/replies:
    get:
      operationId: listPostReplies
      summary: 某帖的回复
      tags:
        - posts
      parameters:
        - schema:
            type: string
          in: query
          name: cursor
          required: false
        - schema:
            type: integer
            minimum: 1
            maximum: 50
          in: query
          name: limit
          required: false
        - schema:
            type: integer
          in: path
          name: id
          required: true
      security: *a2
      responses:
        "200":
          description: Default Response
  /api/users/{handle}/posts:
    get:
      operationId: listUserPosts
      summary: 某账号的帖
      tags:
        - posts
      parameters:
        - schema:
            type: string
          in: query
          name: cursor
          required: false
        - schema:
            type: integer
            minimum: 1
            maximum: 50
          in: query
          name: limit
          required: false
        - schema:
            type: string
            enum:
              - posts
              - replies
          in: query
          name: type
          required: false
        - schema:
            type: string
          in: path
          name: handle
          required: true
      security: *a2
      responses:
        "200":
          description: Default Response
  /api/users/{handle}/likes:
    get:
      operationId: listUserLikes
      summary: 某账号点赞过的帖
      tags:
        - posts
      parameters:
        - schema:
            type: string
          in: query
          name: cursor
          required: false
        - schema:
            type: integer
            minimum: 1
            maximum: 50
          in: query
          name: limit
          required: false
        - schema:
            type: string
          in: path
          name: handle
          required: true
      security: *a2
      responses:
        "200":
          description: Default Response
  /api/users/{handle}/media:
    get:
      operationId: listUserMedia
      summary: 某账号的含媒体帖
      tags:
        - posts
      parameters:
        - schema:
            type: string
          in: query
          name: cursor
          required: false
        - schema:
            type: integer
            minimum: 1
            maximum: 50
          in: query
          name: limit
          required: false
        - schema:
            type: string
          in: path
          name: handle
          required: true
      security: *a2
      responses:
        "200":
          description: Default Response
  /api/posts/{id}/pin:
    post:
      operationId: pinPost
      summary: 置顶
      tags:
        - posts
      parameters:
        - schema:
            type: integer
          in: path
          name: id
          required: true
      security: *a1
      responses:
        "200":
          description: Default Response
    delete:
      operationId: unpinPost
      summary: 取消置顶
      tags:
        - posts
      parameters:
